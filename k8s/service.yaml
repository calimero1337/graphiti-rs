apiVersion: v1
kind: Service
metadata:
  name: graphiti-server
  namespace: claude
  labels:
    app: graphiti-server
    app.kubernetes.io/name: graphiti-server
    app.kubernetes.io/component: api-server
    app.kubernetes.io/part-of: graphiti-rs
spec:
  type: NodePort
  selector:
    app: graphiti-server
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: http
      nodePort: 30239
