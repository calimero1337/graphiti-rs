# Example Secret manifest — DO NOT commit real credentials.
#
# Usage:
#   1. Copy this file to `secret.yaml` (which is git-ignored).
#   2. Base64-encode your real values:
#        echo -n 'my-neo4j-password' | base64
#        echo -n 'sk-...'            | base64
#   3. Replace the placeholder values below.
#   4. Apply: kubectl apply -f k8s/secret.yaml
#
# In production, prefer using an external secrets manager
# (e.g. AWS Secrets Manager + External Secrets Operator, or HashiCorp Vault).
apiVersion: v1
kind: Secret
metadata:
  name: graphiti-secrets
  namespace: claude
  labels:
    app: graphiti-server
    app.kubernetes.io/name: graphiti-server
    app.kubernetes.io/component: api-server
    app.kubernetes.io/part-of: graphiti-rs
type: Opaque
data:
  # echo -n 'changeme' | base64
  NEO4J_PASSWORD: Y2hhbmdlbWU=
  # echo -n 'sk-ant-your-anthropic-api-key' | base64
  ANTHROPIC_API_KEY: c2stYW50LXlvdXItYW50aHJvcGljLWFwaS1rZXk=
  # echo -n 'sk-your-openai-api-key' | base64  (optional, only for openai backend)
  OPENAI_API_KEY: c2steW91ci1vcGVuYWktYXBpLWtleQ==
