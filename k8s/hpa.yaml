apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: graphiti-server
  namespace: claude
  labels:
    app: graphiti-server
    app.kubernetes.io/name: graphiti-server
    app.kubernetes.io/component: api-server
    app.kubernetes.io/part-of: graphiti-rs
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: graphiti-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
