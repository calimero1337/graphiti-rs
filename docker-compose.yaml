# Local development stack for graphiti-rs.
#
# Usage:
#   docker compose up          # start all services
#   docker compose up --build  # rebuild graphiti-server image before starting
#   docker compose down -v     # stop and delete volumes
#
# Required: copy .env.example to .env and fill in OPENAI_API_KEY before starting.

services:
  # ── Neo4j knowledge graph database ─────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: graphiti-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_pagecache_size: "512M"
      NEO4J_dbms_memory_heap_initial__size: "512M"
      NEO4J_dbms_memory_heap_max__size: "1G"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── graphiti-rs REST API server ─────────────────────────────────────────────
  graphiti-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: graphiti-rs:dev
    container_name: graphiti-server
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o}
      SMALL_MODEL_NAME: ${SMALL_MODEL_NAME:-gpt-4.1-nano}
      GROUP_ID: ${GROUP_ID:-}
      MAX_CONCURRENT_LLM_CALLS: ${MAX_CONCURRENT_LLM_CALLS:-5}
      ENTITY_SEARCH_LIMIT: ${ENTITY_SEARCH_LIMIT:-10}
      EDGE_SEARCH_LIMIT: ${EDGE_SEARCH_LIMIT:-10}
      SERVER_PORT: "8080"
      RUST_LOG: ${RUST_LOG:-info}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  neo4j_data:
  neo4j_logs:
